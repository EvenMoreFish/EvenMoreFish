# Configuration for the normal Sell GUI, shown when /emf shop is used, before clicking a sell button.

title: <#006F86>EvenMoreFish - Sell Fish
layout:
  - "iiiiiiiii"
  - "iiiiiiiii"
  - "iiiiiiiii"
  - "   s a   "
filler: light_blue_stained_glass_pane
# The character to use for the slots where players can place fish.
deposit-character: i

sell-item:
  item:
    material: GOLD_INGOT
    displayname: <bold><gold>Sell
    lore:
      - <dark_gray>Fish Shop
      - ''
      - <gray>Click this button to sell all
      - <gray>the fish inside the shop menu.
      - ''
      - <yellow>» (Left-click) sell the fish.
      - <gray>» (Right-click) cancel.
  character: s
  click-action:
    left: sell-shop
    right: full-exit

sell-all-item:
  item:
    material: COD_BUCKET
    displayname: <bold><gold>Sell All
    lore:
      - <dark_gray>Inventory
      - ''
      - <gray>Click this button to sell all
      - <gray>the fish in your inventory.
      - ''
      - <yellow>» (Left-click) sell the fish.
      - <gray>» (Right-click) cancel.
  character: a
  click-action:
    left: sell-inventory
    right: full-exit

# ATTENTION ATTENTION ATTENTION
# DO NOT EDIT THIS VALUE OR THINGS WILL BREAK!!!
version: 1