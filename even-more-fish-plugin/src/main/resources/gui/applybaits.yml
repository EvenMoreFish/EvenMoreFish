    material: pufferfish
    displayname: <red>Exit
    lore:
      - <yellow>Exit to the Menu
  glowing: true
  character: x
  click-action: full-exit

# ATTENTION ATTENTION ATTENTION
# DO NOT EDIT THIS VALUE OR THINGS WILL BREAK!!!
version: 1