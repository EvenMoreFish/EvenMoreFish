# Configuration for the Baits GUI, shown after clicking the baits button in /emf gui.

title: <#006F86>EvenMoreFish - Baits
layout:
  - "  23232  "
  - "23 4 4 32"
  - "4 bbbbb 4"
  - "23 4 4 32"
  - "p 23x32 n"
filler: black_stained_glass_pane
# The character to use for the bait items.
bait-character: b

# How to sort the baits. Valid options are: alphabetical, index. (Default: alphabetical)
sort-type: alphabetical

# The lore to use when a bait can be purchased.
# Supported variables: {quantity}, {price}, {bait}
purchase-lore:
  - Click to purchase {quantity}x {bait} for {price}

exit:
  item:
    material: pufferfish
    displayname: <red>Exit
    lore:
      - <yellow>Exit to the Menu
  glowing: true
  character: x
  click-action: open-main-menu

# Page Buttons
next-page:
  item:
    material: paper
    displayname: <aqua>Next Page
    lore:
      - <yellow>Go to the next page
  fallback-item:
    material: barrier
    displayname: <aqua>Next Page
    lore:
      - <yellow>You are on the last page
  character: n
  page-action: next

last-page:
  item:
    material: arrow
    displayname: <aqua>Last Page
    lore:
      - <yellow>Go to the last page
  fallback-item:
    material: barrier
    displayname: <aqua>Last Page
    lore:
      - <yellow>You are on the last page
  character: l
  page-action: last

previous-page:
  item:
    material: paper
    displayname: <aqua>Previous Page
    lore:
      - <yellow>Go to the previous page
  fallback-item:
    material: barrier
    displayname: <aqua>Previous Page
    lore:
      - <yellow>You are on the first page
  character: p
  page-action: previous

first-page:
  item:
    material: arrow
    displayname: <aqua>First Page
    lore:
      - <yellow>Go to the first page
  fallback-item:
    material: barrier
    displayname: <aqua>First Page
    lore:
      - <yellow>You are on the first page
  character: f
  page-action: first

# ATTENTION ATTENTION ATTENTION
# DO NOT EDIT THIS VALUE OR THINGS WILL BREAK!!!
version: 1