services:
  mysql:
    image: mysql:8.4
    container_name: emf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: evenmorefish
      MYSQL_USER: emf
      MYSQL_PASSWORD: secret
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  minecraft:
    image: itzg/minecraft-server:java25
    container_name: emf-paper
    # For test-time admin commands, use:
    # docker exec -it emf-paper rcon-cli
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "26.1.2"
      MEMORY: "4G"
      ONLINE_MODE: "FALSE"
      TZ: UTC
      RCON_PASSWORD: "secret"
      # Auto-install default test dependencies/plugins on startup.
      # Vault is fetched from Spigot via the supported Spiget integration.
      SPIGET_RESOURCES: "34315"
      # EssentialsX and PlaceholderAPI are fetched from Modrinth.
      MODRINTH_PROJECTS: |
        essentialsx
        placeholderapi
    ports:
      - "25565:25565"
      - "25575:25575"
    volumes:
      - mc-data:/data
      - ./docker/plugins:/data/plugins

volumes:
  mysql-data:
  mc-data:
